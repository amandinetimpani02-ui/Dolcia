<style>
/* ════════════════════════════════════════
   DOLCIA — Design System
   Luxury × Mobile-first × Zero friction
════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'Outfit', sans-serif; -webkit-font-smoothing: antialiased; }

:root {
  --gold: #C9A84C; --gL: #E8C96A; --gXL: #F5DC8A; --gDim: rgba(201,168,76,.1); --gBd: rgba(201,168,76,.25);
  --w9: rgba(255,255,255,.9); --w7: rgba(255,255,255,.7); --w5: rgba(255,255,255,.5);
  --w3: rgba(255,255,255,.3); --w15: rgba(255,255,255,.15); --w08: rgba(255,255,255,.08); --w04: rgba(255,255,255,.04);
  --s1: #0A0A0A; --s2: #141414; --s3: #1E1E1E; --s4: #282828;
  --green: #34D87A; --red: #FF5A5A; --blue: #5B9CF6; --purple: #B8A0F8;
  --play: 'Playfair Display', Georgia, serif;
  --cormo: 'Cormorant Garamond', Georgia, serif;
  --body: 'Outfit', sans-serif;
  --ease: cubic-bezier(.16,1,.3,1);
}

/* Keyframes */
@keyframes spin    { to { transform: rotate(360deg); } }
@keyframes fadeUp  { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }
@keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes slideIn { from { opacity: 0; transform: translateX(32px); } to { opacity: 1; transform: none; } }
@keyframes ping    { 0% { transform: scale(1); opacity: .8; } 100% { transform: scale(2.4); opacity: 0; } }
@keyframes pulse   { 0%, 100% { opacity: .2; } 50% { opacity: 1; } }
@keyframes glow    { 0%, 100% { box-shadow: 0 0 20px rgba(201,168,76,.08); } 50% { box-shadow: 0 0 60px rgba(201,168,76,.25); } }
@keyframes barLoad { from { width: 0; } to { width: 90%; } }

/* ── GOLD BUTTON ── */
.btn-gold {
  background: linear-gradient(115deg, #5A3806, #C8A030 25%, #F0D060 50%, #D4A830 75%, #7A5210);
  background-size: 300% 100%;
  animation: shimmer 3.5s linear infinite;
  color: #000; border: none; cursor: pointer;
  font-family: var(--body); font-weight: 600; letter-spacing: .18em; text-transform: uppercase;
  border-radius: 99px; transition: transform .15s;
}
.btn-gold:hover { transform: translateY(-1px); }
.btn-gold:active { transform: scale(.98); }

  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 32px; overflow: hidden;
  transition: opacity .7s var(--ease);
}
#splash.hidden { opacity: 0; pointer-events: none; }
.sp-bg {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 90% 70% at 50% 100%, rgba(201,168,76,.22), transparent 65%),
              radial-gradient(ellipse 60% 40% at 10% 10%, rgba(201,168,76,.07), transparent 60%);
}
.sp-logo-wrap {
  position: relative; width: 80px; height: 80px; margin-bottom: 32px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.sp-ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 1px solid rgba(201,168,76,.3);
  animation: spin 14s linear infinite;
}
.sp-ring::before {
  content: ''; position: absolute; top: -4px; left: 50%;
  width: 7px; height: 7px; background: var(--gold); border-radius: 50%;
  margin-left: -3.5px;
  box-shadow: 0 0 10px var(--gold), 0 0 22px rgba(201,168,76,.5);
}
.sp-inner {
  width: 52px; height: 52px; border-radius: 50%;
  background: radial-gradient(circle at 38% 33%, rgba(201,168,76,.22), rgba(201,168,76,.04));
  border: 1px solid rgba(201,168,76,.35);
  display: flex; align-items: center; justify-content: center;
}
.sp-title {
  font-family: var(--play);
  font-size: clamp(34px, 9vw, 54px);
  color: #fff; font-weight: 400; line-height: 1.05;
  text-align: center; margin-bottom: 16px;
  animation: fadeUp .7s .1s var(--ease) both;
}
.sp-title em { font-style: italic; color: var(--gL); }
.sp-sub {
  font-size: 13px; color: var(--w5); text-align: center;
  font-weight: 300; line-height: 1.7; max-width: 260px;
  animation: fadeUp .7s .25s var(--ease) both;
}
.sp-bar-wrap {
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: rgba(255,255,255,.05);
}
.sp-bar {
  height: 100%;
  background: linear-gradient(90deg, transparent, var(--gold), var(--gXL), var(--gold), transparent);
  background-size: 200% 100%;
  animation: barLoad 1.8s .2s var(--ease) forwards, shimmer 2s 2s linear infinite;
  width: 0;
}

/* ════════════════════
   APP SHELL
════════════════════ */
#app {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  background: #000; z-index: 1;
  opacity: 0; transition: opacity .5s var(--ease);
}
#app.visible { opacity: 1; }
.app-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scroll-snap-type: y mandatory;
  scrollbar-width: none;
}
.app-scroll::-webkit-scrollbar { display: none; }

/* ════════════════════
   HEADER
════════════════════ */
.hdr {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 58px;
  display: flex; align-items: center; padding: 0 18px; gap: 12px;
  background: linear-gradient(to bottom, rgba(0,0,0,.75), transparent);
  pointer-events: none;
}
.hdr > * { pointer-events: all; }
.hdr-logo { display: flex; align-items: center; gap: 8px; }
.hdr-wm { font-family: var(--body); font-size: 10px; letter-spacing: .52em; color: var(--gL); text-transform: uppercase; font-weight: 400; }
.hdr-city-btn {
  display: flex; align-items: center; gap: 6px;
  background: rgba(0,0,0,.45); backdrop-filter: blur(12px);
  border: 1px solid var(--w15); border-radius: 99px;
  padding: 5px 13px 5px 8px; cursor: pointer; transition: all .18s;
  flex: 1; max-width: 200px; min-width: 0;
}
.hdr-city-btn:hover { border-color: var(--w3); }
.hdr-city-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--green);
  flex-shrink: 0; position: relative;
}
.hdr-city-dot::after {
  content: ''; position: absolute; inset: -3px; border-radius: 50%;
  background: rgba(52,216,122,.28); animation: ping 2s infinite;
}
.hdr-city-name { font-size: 12px; color: var(--w9); font-weight: 400; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.hdr-actions { display: flex; gap: 6px; align-items: center; margin-left: auto; }
.hdr-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(0,0,0,.45); backdrop-filter: blur(12px);
  border: 1px solid var(--w15); display: flex; align-items: center;
  justify-content: center; cursor: pointer; transition: all .18s;
}
.hdr-btn:hover { border-color: var(--w3); }

/* ════════════════════
   BOTTOM NAV
════════════════════ */
.bnav {
  flex-shrink: 0; height: 72px; background: rgba(0,0,0,.97);
  backdrop-filter: blur(28px); border-top: 1px solid var(--w08);
  display: flex; align-items: stretch; padding: 0 4px;
}
.bnav-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px; cursor: pointer; border: none;
  background: none; color: var(--w3); font-family: var(--body);
  border-radius: 14px; margin: 4px 2px; transition: all .2s; padding: 4px 0;
}
.bnav-tab.on { color: var(--gL); }
.bnav-tab.on .bnav-ic { background: var(--gDim); border-color: var(--gBd); }
.bnav-ic {
  width: 40px; height: 40px; border-radius: 12px; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid transparent; transition: all .2s;
}
.bnav-lb { font-size: 8.5px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }

/* ════════════════════
   ONBOARDING
════════════════════ */
#onboarding {
  position: fixed; inset: 0; z-index: 500; background: #000;
  display: flex; flex-direction: column;
}
.onb-progress-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: rgba(255,255,255,.07); z-index: 10;
}
.onb-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gXL));
  transition: width .5s var(--ease);
}
.onb-header {
  padding: 16px 22px 0; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0; position: relative; z-index: 2;
  margin-top: 8px;
}
.onb-step-info { font-size: 9.5px; letter-spacing: .3em; color: rgba(201,168,76,.6); text-transform: uppercase; font-weight: 400; }
.onb-skip { font-size: 12px; color: var(--w3); cursor: pointer; font-weight: 300; transition: color .2s; padding: 4px 0; }
.onb-skip:hover { color: var(--w5); }
.onb-body {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; display: flex; flex-direction: column;
  justify-content: flex-end; padding: 0 22px 36px; position: relative; z-index: 2;
}
.onb-body::-webkit-scrollbar { display: none; }
.onb-bg-glow {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 80% 55% at 50% 100%, rgba(201,168,76,.15), transparent 65%);
}
.onb-q {
  font-family: var(--play);
  font-size: clamp(26px, 7vw, 40px);
  color: #fff; font-weight: 400; line-height: 1.1;
  margin-bottom: 26px;
}
.onb-q em { font-style: italic; color: var(--gL); }
.onb-opts { display: flex; flex-direction: column; gap: 10px; }
.onb-opt {
  display: flex; align-items: center; gap: 14px;
  padding: 15px 17px; border-radius: 18px; cursor: pointer;
  border: 1.5px solid rgba(255,255,255,.09);
  background: rgba(255,255,255,.03);
  transition: all .22s; min-height: 68px;
  -webkit-tap-highlight-color: transparent;
}
.onb-opt:active { transform: scale(.98); }
.onb-opt.sel {
  border-color: rgba(201,168,76,.4);
  background: rgba(201,168,76,.08);
}
.onb-opt-e { font-size: 28px; flex-shrink: 0; width: 40px; text-align: center; }
.onb-opt-l { font-family: var(--play); font-size: 17px; color: #fff; font-weight: 400; line-height: 1.2; }
.onb-opt-s { font-size: 11.5px; color: var(--w5); margin-top: 2px; font-weight: 300; }
.onb-opt-chk {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .22s; margin-left: auto; font-size: 11px; font-weight: 700;
}
.onb-opt.sel .onb-opt-chk { background: var(--gold); border-color: var(--gold); color: #000; }
.onb-cta {
  width: 100%; padding: 17px; font-size: 11px; margin-top: 18px;
  box-shadow: 0 8px 32px rgba(201,168,76,.32);
}
.onb-slide { animation: slideIn .32s var(--ease) both; }

/* ════════════════════
   HERO CARD (fullscreen activity)
════════════════════ */
.hero-card {
  position: relative; width: 100%; height: 100dvh;
  scroll-snap-align: start; scroll-snap-stop: always;
  overflow: hidden; flex-shrink: 0; cursor: pointer;
}
.hero-bg { position: absolute; inset: 0; background: #0A0A12; }
.hero-bg img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .6s ease;
}
.hero-card:hover .hero-bg img { transform: scale(1.03); }
.hero-emoji-bg {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 120px;
  filter: drop-shadow(0 0 60px rgba(201,168,76,.2));
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top,
    rgba(0,0,0,.96) 0%,
    rgba(0,0,0,.55) 35%,
    rgba(0,0,0,.18) 62%,
    transparent 100%
  );
}
.hero-top-fade {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,.65) 0%, transparent 22%);
}
/* Score chip */
.hero-score {
  position: absolute; top: 66px; right: 16px; z-index: 10;
  display: flex; align-items: center; gap: 6px;
  background: rgba(0,0,0,.5); backdrop-filter: blur(10px);
  border: 1px solid var(--w15); border-radius: 99px; padding: 4px 10px;
}
.hero-score-bar { width: 36px; height: 3px; border-radius: 99px; background: rgba(255,255,255,.15); overflow: hidden; }
.hero-score-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--gold), var(--gXL)); transition: width .4s var(--ease); }
.hero-score-num { font-size: 9.5px; color: var(--w7); font-weight: 500; }
/* Badge */
.hero-badge {
  position: absolute; top: 66px; left: 16px; z-index: 10;
  padding: 4px 11px; border-radius: 99px; font-size: 9.5px; font-weight: 600; letter-spacing: .06em;
}
.badge-free { background: rgba(52,216,122,.18); border: 1px solid rgba(52,216,122,.35); color: #34D87A; }
.badge-top  { background: rgba(201,168,76,.18); border: 1px solid rgba(201,168,76,.35); color: var(--gL); }
.badge-ideal { background: rgba(255,90,90,.15); border: 1px solid rgba(255,90,90,.3); color: #FF5A5A; }
/* Progress dots */
.hero-dots {
  position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 5px; z-index: 10;
}
.hero-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,.25); transition: all .3s; }
.hero-dot.on { width: 18px; border-radius: 2px; background: var(--gL); }
/* Content */
.hero-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 0 22px 30px; }
.hero-cat {
  font-size: 9px; letter-spacing: .42em; text-transform: uppercase;
  color: var(--gL); font-family: var(--body); margin-bottom: 10px;
  display: inline-flex; align-items: center; gap: 8px; opacity: .9; font-weight: 400;
}
.hero-cat::before { content: ''; width: 18px; height: 1px; background: var(--gL); opacity: .6; }
.hero-name {
  font-family: var(--play);
  font-size: clamp(26px, 7.5vw, 44px);
  color: #fff; font-weight: 400; line-height: 1.05;
  margin-bottom: 12px;
  text-shadow: 0 2px 20px rgba(0,0,0,.5);
}
.hero-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.hero-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(0,0,0,.55); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.14); border-radius: 99px;
  padding: 6px 13px; font-size: 12px; color: rgba(255,255,255,.8); font-weight: 300;
}
.hero-pill.gold { border-color: rgba(201,168,76,.3); color: var(--gL); background: rgba(201,168,76,.1); }
.hero-pill.green { border-color: rgba(52,216,122,.3); color: #34D87A; background: rgba(52,216,122,.08); }
.hero-pill.red { border-color: rgba(255,90,90,.3); color: #FF5A5A; background: rgba(255,90,90,.08); }
.hero-actions { display: flex; gap: 10px; align-items: center; }
.hero-pass {
  width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,.1); backdrop-filter: blur(10px);
  border: 1px solid var(--w15); display: flex; align-items: center;
  justify-content: center; cursor: pointer; transition: all .2s; font-size: 17px; opacity: .65;
}
.hero-pass:hover { opacity: 1; }
.hero-go {
  flex: 1; padding: 17px; font-size: 11px;
  box-shadow: 0 8px 32px rgba(201,168,76,.32);
}
.hero-save {
  width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,.1); backdrop-filter: blur(10px);
  border: 1px solid var(--w15); display: flex; align-items: center;
  justify-content: center; cursor: pointer; transition: all .2s; font-size: 20px;
}
.hero-save.on { background: rgba(201,168,76,.2); border-color: var(--gBd); }
.hero-save:hover { background: rgba(201,168,76,.15); }

/* ════════════════════
   WEATHER CARD (first card)
════════════════════ */
.wx-card {
  position: relative; width: 100%; height: 100dvh;
  scroll-snap-align: start; scroll-snap-stop: always;
  display: flex; flex-direction: column; overflow: hidden;
  background: linear-gradient(160deg, #080814 0%, #10102A 50%, #08080E 100%);
}
.wx-glow {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 70% 50% at 50% 80%, rgba(201,168,76,.14), transparent 65%);
}
.wx-main {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 80px 32px 0; text-align: center;
}
.wx-ico { font-size: 80px; margin-bottom: 18px; line-height: 1; }
.wx-temp {
  font-family: var(--cormo);
  font-size: clamp(60px, 15vw, 90px);
  color: #fff; font-weight: 300; line-height: 1; margin-bottom: 10px;
}
.wx-desc { font-size: 14px; color: var(--w5); font-weight: 300; margin-bottom: 10px; text-transform: capitalize; }
.wx-reco {
  font-family: var(--play); font-size: 15px; color: var(--gL);
  font-style: italic; line-height: 1.6; max-width: 280px;
}
.wx-footer { padding: 16px 20px 24px; flex-shrink: 0; }
/* Context banner */
.ctx-pill {
  display: flex; align-items: center; gap: 11px;
  background: rgba(201,168,76,.08); border: 1px solid rgba(201,168,76,.18);
  border-radius: 16px; padding: 13px 16px; margin-bottom: 14px;
}
.ctx-pill-e { font-size: 22px; flex-shrink: 0; }
.ctx-pill-txt { font-size: 13px; color: var(--w7); line-height: 1.45; font-weight: 300; }
.ctx-pill-txt strong { color: #fff; font-weight: 500; }
/* Quick actions */
.wx-actions { display: flex; gap: 10px; margin-bottom: 14px; }
.wx-btn {
  flex: 1; display: flex; align-items: center; gap: 10px;
  padding: 14px 15px; border-radius: 16px; cursor: pointer;
  border: 1px solid rgba(255,255,255,.09); transition: all .2s;
  background: rgba(255,255,255,.04);
}
.wx-btn:hover { transform: translateY(-1px); }
.wx-btn-e { font-size: 20px; flex-shrink: 0; }
.wx-btn-l { font-family: var(--play); font-size: 14px; color: #fff; font-weight: 400; }
.wx-btn-s { font-size: 10px; color: var(--w5); margin-top: 1px; font-weight: 300; }
.wx-btn.surprise { background: rgba(184,160,248,.08); border-color: rgba(184,160,248,.2); }
.wx-btn.program  { background: var(--gDim); border-color: var(--gBd); }
/* Plan chips */
.plan-scroll { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.plan-scroll::-webkit-scrollbar { display: none; }
.plan-chip {
  padding: 7px 15px; border-radius: 99px; font-size: 11.5px; font-weight: 300;
  cursor: pointer; border: 1px solid var(--w08); background: none; color: var(--w5);
  font-family: var(--body); white-space: nowrap; transition: all .2s; flex-shrink: 0;
}
.plan-chip.on { border-color: var(--gBd); background: var(--gDim); color: var(--gL); font-weight: 400; }

/* ════════════════════
   CATEGORY STRIP
════════════════════ */
.cat-strip-wrap { background: #000; padding: 14px 0 0; flex-shrink: 0; }
.cat-strip { display: flex; gap: 8px; overflow-x: auto; padding: 0 18px 12px; scrollbar-width: none; }
.cat-strip::-webkit-scrollbar { display: none; }
.cat-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; flex-shrink: 0; }
.cat-item-ring {
  width: 52px; height: 52px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; border: 1.5px solid var(--w08);
  background: rgba(255,255,255,.04); transition: all .2s;
}
.cat-item.on .cat-item-ring { border-color: var(--gBd); background: var(--gDim); }
.cat-item-lbl { font-size: 9px; color: var(--w3); white-space: nowrap; font-weight: 300; transition: color .2s; }
.cat-item.on .cat-item-lbl { color: var(--gL); }

/* ════════════════════
   LIST VIEW
════════════════════ */
.list-view { background: #000; padding-bottom: 24px; }
.list-section-hdr {
  display: flex; align-items: center; gap: 14px;
  padding: 20px 18px 12px;
}
.list-section-ttl { font-family: var(--play); font-size: 21px; color: #fff; font-weight: 400; }
.list-section-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--w08), transparent); }
.list-section-count { font-size: 11px; color: var(--w3); font-weight: 300; }
.list-item {
  display: flex; align-items: center; gap: 13px;
  padding: 13px 18px; cursor: pointer; transition: background .15s;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.list-item:hover { background: rgba(255,255,255,.03); }
.list-thumb {
  width: 66px; height: 66px; border-radius: 14px;
  background: var(--s3); flex-shrink: 0; overflow: hidden;
  display: flex; align-items: center; justify-content: center; font-size: 26px;
  position: relative;
}
.list-thumb img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
.list-name { font-family: var(--play); font-size: 15.5px; color: #fff; font-weight: 400; line-height: 1.2; margin-bottom: 4px; }
.list-meta { font-size: 11px; color: var(--w5); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-weight: 300; }
.list-price { font-size: 12px; color: var(--gL); font-weight: 400; margin-top: 4px; }
.list-price.free { color: #34D87A; }
.list-arr { font-size: 14px; color: var(--w3); margin-left: auto; flex-shrink: 0; }

/* ════════════════════
   AGENDA PAGE
════════════════════ */
.agenda-page { min-height: 100dvh; padding: 80px 20px 24px; background: #000; }
.agenda-ttl { font-family: var(--play); font-size: 28px; color: #fff; font-weight: 400; margin-bottom: 4px; }
.agenda-sub { font-size: 13px; color: var(--w5); font-weight: 300; margin-bottom: 20px; }
.ev-item { display: flex; gap: 13px; align-items: flex-start; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,.05); cursor: pointer; transition: transform .18s; }
.ev-item:hover { transform: translateX(3px); }
.ev-item:last-child { border: none; }
.ev-date { flex-shrink: 0; text-align: center; background: var(--gDim); border: 1px solid var(--gBd); border-radius: 12px; padding: 8px 12px; min-width: 52px; }
.ev-day { font-family: var(--play); font-size: 26px; color: var(--gold); line-height: 1; font-weight: 400; }
.ev-mon { font-size: 8.5px; color: var(--gL); text-transform: uppercase; letter-spacing: .12em; margin-top: 1px; font-family: var(--body); }
.ev-title { font-family: var(--play); font-size: 16px; color: #fff; font-weight: 400; margin-bottom: 3px; line-height: 1.2; }
.ev-loc { font-size: 11.5px; color: var(--w5); font-weight: 300; }
.ev-tags { display: flex; gap: 6px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
.ev-tag { padding: 2px 9px; border-radius: 99px; font-size: 9px; font-weight: 500; background: rgba(184,160,248,.12); color: var(--purple); }
.ev-tag.free { background: rgba(52,216,122,.1); color: #34D87A; border: 1px solid rgba(52,216,122,.2); }

/* ════════════════════
   SERVICES PAGE
════════════════════ */
.svc-page { min-height: 100dvh; padding: 80px 18px 24px; background: #000; }
.sos-card {
  display: flex; align-items: center; gap: 14px; padding: 20px 18px;
  border-radius: 20px; cursor: pointer; margin-bottom: 14px;
  background: linear-gradient(135deg, rgba(255,90,90,.12), rgba(255,90,90,.04));
  border: 1.5px solid rgba(255,90,90,.28); transition: all .24s; animation: glow 4s infinite;
}
.sos-card:hover { transform: scale(1.01); }
.sos-ico { font-size: 36px; flex-shrink: 0; }
.sos-name { font-family: var(--play); font-size: 20px; color: #fff; font-weight: 400; line-height: 1.15; }
.sos-desc { font-size: 11.5px; color: var(--w5); margin-top: 3px; font-weight: 300; }
.sos-arr { font-size: 20px; color: #FF5A5A; margin-left: auto; flex-shrink: 0; }
.svc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
.svc-item {
  background: var(--s2); border: 1px solid var(--w08); border-radius: 20px;
  padding: 20px 14px; cursor: pointer; transition: all .22s; text-align: center;
}
.svc-item:hover { border-color: var(--w15); transform: translateY(-2px); }
.svc-e { font-size: 30px; margin-bottom: 8px; display: block; }
.svc-n { font-family: var(--play); font-size: 15px; color: #fff; margin-bottom: 4px; font-weight: 400; }
.svc-d { font-size: 11px; color: var(--w5); line-height: 1.45; font-weight: 300; }
.svc-tag { display: inline-block; margin-top: 9px; padding: 3px 10px; border-radius: 99px; font-size: 9px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; }
.stag-g { background: rgba(52,216,122,.1); color: #34D87A; }
.stag-gold { background: var(--gDim); color: var(--gL); }
.stag-b { background: rgba(91,156,246,.1); color: var(--blue); }

/* ════════════════════
   SAVED PAGE
════════════════════ */
.saved-page { min-height: 100dvh; padding: 80px 18px 24px; background: #000; }
.saved-item {
  display: flex; align-items: center; gap: 13px; padding: 14px;
  background: var(--s2); border: 1px solid var(--w08); border-radius: 16px;
  margin-bottom: 10px; cursor: pointer; transition: border-color .18s;
}
.saved-item:hover { border-color: var(--w15); }
.saved-ico { width: 50px; height: 50px; border-radius: 13px; background: var(--s3); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }

/* ════════════════════
   DETAIL OVERLAY
════════════════════ */
#detail {
  position: fixed; inset: 0; z-index: 600; background: #000;
  display: flex; flex-direction: column; overflow-y: auto;
  animation: fadeIn .22s;
}
.det-hero { height: 52dvh; position: relative; flex-shrink: 0; overflow: hidden; }
.det-hero img { width: 100%; height: 100%; object-fit: cover; }
.det-hero-emoji { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 100px; }
.det-hero-ov { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.95) 0%, rgba(0,0,0,.15) 55%, transparent 100%); }
.det-back {
  position: absolute; top: 16px; left: 16px; width: 40px; height: 40px;
  border-radius: 50%; background: rgba(0,0,0,.5); backdrop-filter: blur(10px);
  border: 1px solid var(--w15); display: flex; align-items: center;
  justify-content: center; cursor: pointer; font-size: 16px; color: var(--w7); z-index: 10;
}
.det-body { padding: 22px 20px; flex: 1; }
.det-cat { font-size: 9px; letter-spacing: .32em; text-transform: uppercase; color: var(--gL); font-family: var(--body); margin-bottom: 8px; opacity: .85; }
.det-name { font-family: var(--play); font-size: clamp(24px, 7vw, 38px); color: #fff; font-weight: 400; line-height: 1.05; margin-bottom: 13px; }
.det-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.det-pill { display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px; background: var(--s2); border: 1px solid var(--w08); border-radius: 99px; font-size: 11.5px; color: var(--w5); font-weight: 300; }
.det-pill.gold { border-color: var(--gBd); color: var(--gL); background: var(--gDim); }
.det-pill.green { border-color: rgba(52,216,122,.25); color: #34D87A; background: rgba(52,216,122,.06); }
.det-pill.red { border-color: rgba(255,90,90,.25); color: #FF5A5A; background: rgba(255,90,90,.06); }
/* Phone CTA */
.det-phone {
  display: flex; align-items: center; gap: 13px; padding: 16px 18px;
  background: rgba(52,216,122,.07); border: 1px solid rgba(52,216,122,.22);
  border-radius: 16px; margin-bottom: 10px; text-decoration: none; transition: all .18s;
}
.det-phone:hover { background: rgba(52,216,122,.12); }
.det-phone-ic { width: 42px; height: 42px; border-radius: 12px; background: rgba(52,216,122,.15); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.det-phone-name { font-family: var(--play); font-size: 16px; color: #fff; font-weight: 400; }
.det-phone-num { font-size: 12px; color: rgba(52,216,122,.9); margin-top: 2px; font-weight: 300; }
.det-phone-arr { font-size: 18px; color: #34D87A; margin-left: auto; }
/* Website */
.det-web {
  display: flex; align-items: center; gap: 13px; padding: 13px 18px;
  background: rgba(255,255,255,.03); border: 1px solid var(--w08);
  border-radius: 14px; margin-bottom: 14px; cursor: pointer; transition: all .18s;
}
.det-web:hover { border-color: var(--w15); }
.det-web-ic { width: 38px; height: 38px; border-radius: 10px; background: rgba(91,156,246,.1); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.det-web-url { font-size: 12px; color: var(--w5); font-weight: 300; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* AI tip */
.det-ai { background: var(--gDim); border: 1px solid var(--gBd); border-radius: 16px; padding: 15px 17px; margin-bottom: 22px; position: relative; overflow: hidden; }
.det-ai::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,168,76,.5), transparent); }
.det-ai-lbl { font-size: 9px; color: var(--gL); letter-spacing: .26em; text-transform: uppercase; font-family: var(--body); margin-bottom: 8px; opacity: .8; }
.det-ai-txt { font-size: 13.5px; color: var(--w7); line-height: 1.72; font-weight: 300; }
.det-ai-txt strong { color: #fff; font-weight: 500; }
/* Reviews */
.det-review { background: var(--s2); border: 1px solid var(--w08); border-radius: 14px; padding: 14px; margin-bottom: 8px; }
.det-review-stars { font-size: 11px; color: var(--gold); margin-bottom: 5px; }
.det-review-txt { font-size: 13px; color: var(--w5); line-height: 1.6; font-weight: 300; }
.det-review-by { font-size: 10.5px; color: var(--w3); margin-top: 6px; font-weight: 300; }
/* CTAs */
.det-ctas { display: flex; gap: 10px; flex-wrap: wrap; }
.det-cta-main { flex: 1; min-width: 130px; padding: 16px; font-size: 11px; box-shadow: 0 8px 28px rgba(201,168,76,.26); }
.det-cta-sec { padding: 16px 20px; border-radius: 99px; background: var(--s2); border: 1px solid var(--w15); color: var(--w5); font-size: 12px; cursor: pointer; font-family: var(--body); transition: all .18s; font-weight: 400; }
.det-cta-sec:hover { color: #fff; border-color: var(--w3); }
.ai-dots { display: flex; gap: 6px; align-items: center; padding: 8px 0; }
.ai-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--gL); animation: pulse 1.4s infinite; }
.ai-dots span:nth-child(2) { animation-delay: .22s; }
.ai-dots span:nth-child(3) { animation-delay: .44s; }

/* ════════════════════
   FILTER SHEET
════════════════════ */
.sheet-overlay { position: fixed; inset: 0; z-index: 700; background: rgba(0,0,0,.75); backdrop-filter: blur(8px); display: flex; align-items: flex-end; justify-content: center; animation: fadeIn .18s; }
.sheet { background: #0A0A0A; border-radius: 28px 28px 0 0; width: 100%; max-width: 480px; padding: 24px 20px 40px; border: 1px solid var(--w08); border-bottom: none; animation: slideUp .3s var(--ease); max-height: 88dvh; overflow-y: auto; scrollbar-width: none; }
.sheet::-webkit-scrollbar { display: none; }
.sheet-handle { width: 36px; height: 4px; border-radius: 99px; background: var(--w15); margin: 0 auto 22px; }
.sheet-title { font-family: var(--play); font-size: 22px; color: #fff; font-weight: 400; margin-bottom: 20px; }
.filter-sec { margin-bottom: 20px; }
.filter-sec-lbl { font-size: 9.5px; letter-spacing: .28em; text-transform: uppercase; color: var(--gL); font-family: var(--body); margin-bottom: 10px; opacity: .7; }
.filter-chips { display: flex; gap: 7px; flex-wrap: wrap; }
.f-chip { padding: 8px 15px; border-radius: 99px; font-size: 12px; font-weight: 300; cursor: pointer; border: 1px solid var(--w08); background: none; color: var(--w5); font-family: var(--body); transition: all .18s; white-space: nowrap; }
.f-chip.on { border-color: var(--gBd); background: var(--gDim); color: var(--gL); font-weight: 400; }

/* ════════════════════
   SEARCH OVERLAY
════════════════════ */
.search-overlay { position: fixed; inset: 0; z-index: 600; background: rgba(0,0,0,.93); backdrop-filter: blur(20px); display: flex; flex-direction: column; padding: 20px; animation: fadeIn .18s; }
.search-row { display: flex; gap: 8px; align-items: center; margin-bottom: 18px; }
.search-input-wrap { flex: 1; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,.06); border: 1.5px solid var(--w15); border-radius: 18px; padding: 4px 4px 4px 18px; transition: all .22s; }
.search-input-wrap:focus-within { border-color: var(--gBd); box-shadow: 0 0 0 4px rgba(201,168,76,.07); }
.search-inp { flex: 1; background: none; border: none; outline: none; font-size: 16px; color: #fff; font-family: var(--body); padding: 12px 0; font-weight: 300; }
.search-inp::placeholder { color: var(--w3); }
.search-send { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, #8A6010, var(--gold)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #000; font-size: 16px; flex-shrink: 0; }
.search-cancel { background: none; border: none; color: var(--w5); font-family: var(--body); font-size: 13px; cursor: pointer; padding: 8px 0; font-weight: 300; flex-shrink: 0; }
.ai-answer { background: var(--gDim); border: 1px solid var(--gBd); border-radius: 18px; padding: 15px 17px; margin-bottom: 16px; position: relative; overflow: hidden; animation: fadeUp .3s both; }
.ai-answer::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,168,76,.5), transparent); }
.ai-answer-lbl { font-size: 9px; letter-spacing: .28em; text-transform: uppercase; color: var(--gL); font-family: var(--body); margin-bottom: 8px; opacity: .8; }
.ai-answer-txt { font-size: 14px; color: var(--w7); line-height: 1.72; font-weight: 300; }
.ai-answer-txt strong { color: #fff; font-weight: 500; }
.search-suggestion { padding: 13px 16px; border-radius: 12px; border: 1px solid var(--w08); margin-bottom: 8px; cursor: pointer; font-size: 13px; color: var(--w5); font-weight: 300; background: rgba(255,255,255,.02); transition: all .15s; }
.search-suggestion:hover { border-color: var(--w15); color: var(--w7); background: rgba(255,255,255,.04); }

/* ════════════════════
   DISPATCH SHEET
════════════════════ */
.disp-spinner { width: 52px; height: 52px; border: 2px solid var(--w08); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 14px; }
.disp-inp { width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--w08); border-radius: 13px; padding: 14px 17px; font-size: 14px; color: #fff; font-family: var(--body); outline: none; margin-bottom: 12px; transition: all .2s; font-weight: 300; }
.disp-inp:focus { border-color: var(--gBd); }
.disp-inp::placeholder { color: var(--w15); }
.disp-go { width: 100%; padding: 16px; font-size: 11px; margin-bottom: 10px; box-shadow: 0 8px 26px rgba(201,168,76,.26); }
.disp-cancel { width: 100%; padding: 14px; border-radius: 99px; background: rgba(255,255,255,.05); border: 1px solid var(--w08); color: var(--w5); font-size: 12.5px; cursor: pointer; font-family: var(--body); font-weight: 300; }
.dp { display: flex; align-items: center; gap: 11px; background: var(--s3); border-radius: 14px; padding: 12px 15px; border: 1px solid var(--w08); margin-bottom: 10px; transition: all .4s; }
.dp.alerted { border-color: var(--gold); background: var(--gDim); }
.dp.accepted { border-color: #34D87A; background: rgba(52,216,122,.06); }
.dp-av { width: 40px; height: 40px; border-radius: 12px; background: var(--s4); display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0; }
.dp-n { font-size: 14px; color: #fff; font-weight: 500; }
.dp-m { font-size: 11px; color: var(--w5); margin-top: 2px; font-weight: 300; }
.dp-st { font-size: 11px; font-weight: 600; margin-left: auto; }
.dp-st.w { color: var(--w3); } .dp-st.a { color: var(--gold); } .dp-st.ok { color: #34D87A; }

/* ════════════════════
   CITY PICKER
════════════════════ */
.city-inp { flex: 1; background: none; border: none; outline: none; font-size: 15px; color: #fff; font-family: var(--body); padding: 11px 0; font-weight: 300; }
.city-inp::placeholder { color: var(--w15); }
.city-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 13px; cursor: pointer; transition: background .15s; }
.city-item:hover { background: var(--w04); }
.city-item-ic { width: 38px; height: 38px; border-radius: 11px; background: var(--s3); border: 1px solid var(--w08); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.city-item-name { font-size: 14.5px; color: #fff; font-weight: 400; }
.city-item-reg { font-size: 11px; color: var(--w3); margin-top: 2px; font-weight: 300; }

/* ════════════════════
   GATE / LOGIN
════════════════════ */

  position: fixed; inset: 0; z-index: 400; background: #04040E;

.gate-logo-wrap { position: relative; width: 80px; height: 80px; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.gate-ring { position: absolute; inset: 0; border-radius: 50%; border: 1px solid rgba(201,168,76,.28); animation: spin 12s linear infinite; }
.gate-ring::before { content: ''; position: absolute; top: -4px; left: 50%; width: 7px; height: 7px; background: var(--gold); border-radius: 50%; margin-left: -3.5px; box-shadow: 0 0 10px var(--gold), 0 0 22px rgba(201,168,76,.5); }
.gate-inner { width: 52px; height: 52px; border-radius: 50%; background: radial-gradient(circle at 38% 33%, rgba(201,168,76,.22), rgba(201,168,76,.04)); border: 1px solid rgba(201,168,76,.32); display: flex; align-items: center; justify-content: center; }
.gate-eyebrow { font-family: var(--body); font-size: 10px; letter-spacing: .55em; color: var(--gL); text-transform: uppercase; margin-bottom: 10px; text-align: center; opacity: .8; }

async function apiPlaces(lat,lng,radius,type){
  try{

    if(!r.ok)return[];

    if(d.status==='REQUEST_DENIED')return[];

function calcDist(a,b,c,d){
  const R=6371,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180,
    x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))*10)/10;
}

function toAct(p,cLat,cLng){
  const type=p.types?.[0]||'tourist_attraction';

  return{

    dist:calcDist(cLat,cLng,p.geometry.location.lat,p.geometry.location.lng),
    price:priceStr(p.price_level),priceN:p.price_level??null,
    rating:p.rating||0,reviews:p.user_ratings_total||0,

  };
}

══════════════════════════════════════════ */
function score(act,{weather,hour,who,plan,budget}){
  let s=50;
  const main=weather?.weather?.[0]?.main;
  const temp=weather?.main?.temp??15;
  const isRain=['Rain','Drizzle','Thunderstorm'].includes(main);
  const isWarm=temp>17; const isCold=temp<10;
  // Météo
  if(isRain){
    if(['spa','museum','movie_theater','casino','bowling_alley','swimming_pool','library','aquarium'].includes(act.cat))s+=25;
    if(['beach','park','natural_feature','golf_course'].includes(act.cat))s-=25;
  }
  if(isWarm&&!isRain){if(['beach','park','natural_feature','swimming_pool'].includes(act.cat))s+=22;}
  if(isCold){if(['spa','museum','movie_theater','lodging','cafe'].includes(act.cat))s+=15;}
  // Heure du jour
  const isEvening=hour>=17&&hour<22; const isNight=hour>=22||hour<2;
  if(isEvening){if(['restaurant','bar','casino','night_club'].includes(act.cat))s+=20;}
  if(hour>=18&&hour<21&&main==='Clear'){if(['natural_feature','beach','park'].includes(act.cat))s+=28;}
  if(hour>=8&&hour<13){if(['cafe','bakery','park','beach','gym'].includes(act.cat))s+=12;}
  if(hour>=12&&hour<14){if(['restaurant','cafe'].includes(act.cat))s+=18;}
  if(isNight){if(['night_club','casino','bar'].includes(act.cat))s+=25;else s-=15;}
  // Profil
  const wb={
    couple:{spa:22,restaurant:18,museum:8,bar:10,casino:8,natural_feature:15},
    famille:{amusement_park:25,park:15,beach:18,restaurant:10,swimming_pool:20,zoo:22,aquarium:20,bowling_alley:18},
    enfants:{amusement_park:28,park:18,beach:22,zoo:28,aquarium:25,swimming_pool:24},
    amis:{casino:18,bar:15,night_club:15,amusement_park:12,bowling_alley:18,restaurant:12},
    solo:{museum:15,park:12,spa:10,library:12,art_gallery:12,natural_feature:10},
  };
  s+=wb[who]?.[act.cat]||0;
  // Moment
  if(plan==='tonight'&&['restaurant','bar','casino','night_club'].includes(act.cat))s+=15;
  if((plan==='fullday'||plan==='weekend')&&['tourist_attraction','museum','amusement_park','park','zoo'].includes(act.cat))s+=10;
  // Budget
  if(budget==='free'){if(act.priceN===0)s+=30;else if((act.priceN||0)>0)s-=20;}
  if(budget==='low'&&(act.priceN||0)<=1)s+=12;
  if(budget==='high'&&(act.priceN||0)>=3)s+=8;
  // Qualité
  if((act.rating||0)>=4.7)s+=10;else if((act.rating||0)>=4.4)s+=5;
  if((act.reviews||0)>=200)s+=5;
  // Dispo
  if(act.isOpen===false)s-=28;
  if(act.isOpen===true)s+=6;
  return Math.max(0,Math.min(100,Math.round(s)));
}

  const slots={
    halfday:h<12?[{t:'9h30',l:'Matin'},{t:'11h30',l:'Pause'},{t:'13h',l:'Déjeuner'}]:[{t:'14h',l:'Après-midi'},{t:'17h',l:'Détente'},{t:'19h30',l:'Apéritif'}],
    fullday:[{t:'9h',l:'Matin'},{t:'12h30',l:'Déjeuner'},{t:'15h',l:'Après-midi'},{t:'18h',l:'Apéritif'},{t:'20h',l:'Dîner'}],
    weekend:[{t:'Sam 10h',l:'Matin'},{t:'Sam 13h',l:'Déjeuner'},{t:'Sam 16h',l:'Après-midi'},{t:'Sam 20h',l:'Soirée'},{t:'Dim 10h',l:'Découverte'},{t:'Dim 13h',l:'Déjeuner'}],
    tonight:[{t:'19h',l:'Apéritif'},{t:'20h30',l:'Dîner'},{t:'22h30',l:'Soirée'}],
    now:[{t:'Maintenant',l:'Activité'},{t:'+2h',l:'Suite'},{t:'+4h',l:'Pour finir'}],
  };
  const catMap={
    Matin:['park','beach','tourist_attraction'],Matinée:['park','beach','tourist_attraction','gym'],
    Pause:['museum','cafe'],Déjeuner:['restaurant','cafe'],
    'Après-midi':isRain?['spa','museum','movie_theater']:['tourist_attraction','museum','beach','swimming_pool'],
    Détente:['spa','beach','park'],Apéritif:['bar','restaurant'],Dîner:['restaurant'],
    Soirée:['casino','bar','night_club'],Découverte:['park','beach','tourist_attraction'],
    Suite:isRain?['spa','museum']:['park','beach'],'Pour finir':['restaurant','bar'],
    Activité:isRain?['spa','museum','movie_theater']:['beach','park','tourist_attraction'],
  };
  return(slots[plan]||slots.now).map(s=>{
    const cats=catMap[s.l]||['tourist_attraction'];
    const cand=acts.filter(a=>cats.some(c=>a.cat===c)&&a.isOpen!==false).sort((a,b)=>(b.rating||0)-(a.rating||0));
    return{...s,act:cand[0]||null};
  }).filter(s=>s.act);
}

    snackRef.current=setTimeout(()=>setSnack(s=>({...s,on:false})),3500);
  },[]);

  useEffect(()=>{
    if(screen!=='app')return;
    apiWeather(city.lat,city.lng).then(setWeather);
  },[city,screen]);

  // ── Load activities ──
  useEffect(()=>{
    if(screen!=='app')return;
    loadActs();
    apiEvents(city.lat,city.lng,city.n).then(setEvents);
  },[city,radius,screen]);

  async function loadActs(){
    setLoading(true);setApiLive(false);
    // Show fallback immediately so screen is never empty
    setActs(getFallback(city));
    const b1=PLACE_TYPES.slice(0,10),b2=PLACE_TYPES.slice(10,20),b3=PLACE_TYPES.slice(20);
    try{
      const[r1,r2,r3]=await Promise.all([
        Promise.all(b1.map(t=>apiPlaces(city.lat,city.lng,radius,t))),
        Promise.all(b2.map(t=>apiPlaces(city.lat,city.lng,radius,t))),
        Promise.all(b3.map(t=>apiPlaces(city.lat,city.lng,radius,t))),
      ]);
      const seen=new Set();
      const all=[...r1,...r2,...r3].flat().filter(p=>{if(seen.has(p.place_id))return false;seen.add(p.place_id);return true;});
      if(all.length>0){setActs(all.map(p=>toAct(p,city.lat,city.lng)).sort((a,b)=>(b.rating||0)-(a.rating||0)));setApiLive(true);}
      else setActs(getFallback(city));
    }catch{setActs(getFallback(city));}
    setLoading(false);
  }

  // ── Scoring ──
  const scored=useMemo(()=>{
    const h=new Date().getHours();
    return acts.map(a=>({...a,score:score(a,{weather,hour:h,who,plan,budget:onbAns.budget})}))
               .sort((a,b)=>b.score-a.score);
  },[acts,weather,who,plan,onbAns.budget]);

  const filtered=useMemo(()=>scored.filter(a=>cat==='all'||a.cat===cat),[scored,cat]);

  // ── AI Search ──
  async function doSearch(){
    if(!aiQ.trim())return;
    setAiLoading(true);setAiAns(null);
    const list=acts.slice(0,22).map(a=>`${a.name}(${a.catL},${dstr(a.dist)},${a.price||''})`).join('|');
    const w=weather?`Météo: ${weather.weather?.[0]?.description}, ${Math.round(weather.main?.temp)}°C. `:'';
    const p=`Tu es Dolcia, assistant du temps libre à ${city.n}. ${w}Catalogue: ${list}. Demande: "${aiQ}". Contexte: ${who}, moment: ${plan}. Réponds en 2-3 phrases, cite 2-3 activités en **gras**, enthousiaste et précis. Max 70 mots. Français.`;
    const ans=await apiGemini(p);
    setAiAns(ans||'Voici les meilleures options pour votre recherche.');
    setAiLoading(false);
  }

    setDetail(act);setDetailData(null);document.body.style.overflow='hidden';

    ]);
    setDetailData({det,tip});

  function openDisp(type){
    setDisp(type);setDispLive(false);
    setDispProv(DISP[type].prov.map(p=>({...p,st:'w'})));
    document.body.style.overflow='hidden';
  }
  function launchDisp(){
    setDispLive(true);
    const cfg=DISP[disp];
    cfg.prov.forEach((_,i)=>setTimeout(()=>setDispProv(prev=>prev.map((p,idx)=>idx===i?{...p,st:'a'}:p)),700+i*600));

  // ── Surprise ──
  function handleSurprise(){

        <div className="gate-ring"/>

            <path d="M24 18L24 102L58 102C84 102 98 86 98 60C98 34 84 18 58 18ZM40 32L56 32C74 32 80 44 80 60C80 76 74 88 56 88L40 88Z" fill="url(#gl)"/>
            <line x1="16" y1="82" x2="74" y2="20" stroke="url(#gl)" strokeWidth="5" strokeLinecap="round"/>
          </svg>
        </div>
      </div>

  fontFamily:"'Playfair Display',serif",

  fontStyle:'italic',

  textAlign:'center',

  lineHeight:1.6,

        </div>

      const parts=q.split('\n');
      return parts.map((line,i)=>{
        const idx=line.indexOf(em);

      <div className={`snack${snack.on?' on':''}`}>{snack.msg}</div>
    </div>

        <span className="hdr-wm">Dolcia</span>

      <div className="hdr-city-btn" onClick={()=>setShowCity(true)}>
        <div className="hdr-city-dot"/>

        </div>
        <div className="hdr-btn" onClick={()=>setScreen('gate')}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{color:'var(--w3)'}}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </div>
      </div>
    </div>

    <div className="app-scroll">

      {/* ── DISCOVER ── */}
      {tab==='discover'&&<>
        {/* WEATHER CARD */}
        <div className="wx-card">

          <div className="wx-main">
            <div className="wx-ico"><WxSvg code={weather?.weather?.[0]?.main}/></div>

                <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'1px solid rgba(255,255,255,.05)'}}>

/* ══════════════════════════════════════════
   HERO CARD
══════════════════════════════════════════ */
function HeroCard({act,idx,total,apiLive,saved,onOpen,onSave,onAdd}){
  const pUrl=act.photoRef&&apiLive?photoUrl(act.photoRef,800):null;
  const s=act.score||50;
  const badge=act.priceN===0?{label:'Gratuit',cls:'badge-free'}:s>=82?{label:'✦ Idéal',cls:'badge-ideal'}:act.rating>=4.8?{label:'★ Exceptionnel',cls:'badge-top'}:null;
  return(
    <div className="hero-card" onClick={onOpen}>
      <div className="hero-bg">
        {pUrl&&<img src={pUrl} alt={act.name} loading={idx<3?'eager':'lazy'} onError={e=>e.target.style.display='none'}/>}
        {!pUrl&&<div className="hero-emoji-bg">{act.e||'✨'}</div>}
      </div>
      <div className="hero-overlay"/>
      <div className="hero-top-fade"/>
      <div className="hero-score">
        <div className="hero-score-bar"><div className="hero-score-fill" style={{width:s+'%'}}/></div>
        <span className="hero-score-num">{s}</span>
      </div>
      {badge&&<div className={`hero-badge ${badge.cls}`} style={{top:66,left:16}}>{badge.label}</div>}
      {total>1&&total<=14&&(
        <div className="hero-dots">
          {Array.from({length:Math.min(total,8)}).map((_,i)=>(
            <div key={i} className={`hero-dot${i===idx?' on':''}`}/>
          ))}
        </div>
      )}
      <div className="hero-content">
        <div className="hero-cat">{act.catL}</div>
        <div className="hero-name">{act.name}</div>
        <div className="hero-pills">
          <div className="hero-pill gold">{dstr(act.dist||0)}</div>
          {act.price&&<div className="hero-pill">💶 {act.price}</div>}
          {act.rating>0&&<div className="hero-pill">★ {act.rating.toFixed(1)}{act.reviews>0&&` (${act.reviews})`}</div>}
          {act.isOpen===true&&<div className="hero-pill green">● Ouvert</div>}
          {act.isOpen===false&&<div className="hero-pill red">● Fermé</div>}
        </div>
        <div className="hero-actions" onClick={e=>e.stopPropagation()}>
          <div className="hero-pass" onClick={e=>{e.stopPropagation();}} title="Suivant">⏭</div>
          <button className="btn-gold hero-go" onClick={e=>{e.stopPropagation();onOpen();}}>
            {act.priceN===0?"Y aller":"Voir & réserver"}
          </button>
          <div className={`hero-save${saved?' on':''}`} onClick={e=>{e.stopPropagation();onSave();}} title="Sauvegarder">
            {saved?'♥':'♡'}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   EVENT ITEM
══════════════════════════════════════════ */
function EvItem({ev,src}){
  const title=src==='oa'?(ev.title?.fr||ev.title?.en||'Événement'):ev.ttl;
  const day=src==='oa'?new Date(ev.firstDate).getDate():ev.day;
  const mon=src==='oa'?new Date(ev.firstDate).toLocaleDateString('fr',{month:'short'}):ev.mon;
  const loc=src==='oa'?(ev.location?.name||''):ev.loc;
  const type=src==='oa'?(ev.keywords?.fr?.[0]||'Événement'):ev.type;
  const free=ev.free===true||(src==='oa'&&ev.registration?.price===0);
  return(
    <div className="ev-item">
      <div className="ev-date"><div className="ev-day">{day}</div><div className="ev-mon">{mon}</div></div>
      <div style={{flex:1,minWidth:0}}>
        <div className="ev-title">{title}</div>
        <div className="ev-loc">{loc}</div>
        <div className="ev-tags">
          <span className="ev-tag">{type}</span>
          {free&&<span className="ev-tag free">🆓 Gratuit</span>}
        </div>
      </div>
    </div>
  );
}

   SEARCH OVERLAY
══════════════════════════════════════════ */
function SearchOverlay({q,setQ,ans,loading,onSearch,onClose}){
  const ref=useRef(null);
  useEffect(()=>{setTimeout(()=>ref.current?.focus(),100);},[]);
  const suggestions=["Spa romantique pour ce soir","Activité sous la pluie en famille","Dîner gastronomique vue mer","Sport et plein air ce matin","Soirée casino ou bar élégant","Coucher de soleil avec vue","Gratuit ce week-end","Activité avec enfants de 3 ans","Massage duo en amoureux"];
  return(
    <div className="search-overlay">
      <div className="search-row">
        <div className="search-input-wrap">
          <input ref={ref} className="search-inp" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&onSearch()} placeholder="Spa romantique, pluie, dîner vue mer, enfants…"/>
          <button className="search-send" onClick={onSearch}>➤</button>
        </div>
        <button className="search-cancel" onClick={onClose}>Fermer</button>
      </div>
      {loading&&<div className="ai-answer"><div className="ai-answer-lbl">✦ Dolcia IA</div><div className="ai-dots"><span/><span/><span/></div></div>}
      {ans&&!loading&&<div className="ai-answer"><div className="ai-answer-lbl">✦ Dolcia · suggestions pour vous</div><div className="ai-answer-txt" dangerouslySetInnerHTML={{__html:fmt(ans)}}/></div>}
      {!ans&&!loading&&<>
        <div style={{fontSize:11,color:'var(--w3)',marginBottom:14,fontWeight:300}}>Idées de recherche :</div>
        {suggestions.map(s=><div key={s} className="search-suggestion" onClick={()=>{setQ(s);setTimeout(onSearch,100);}}>{s}</div>)}
      </>}
    </div>
  );
}

function ProDash({partner}){

        ))}
      </div>
      <div className="g2" style={{marginBottom:12,alignItems:'start'}}>
        <div className="card-box card-p">
          <div style={{fontFamily:'var(--play)',fontSize:15,color:'#fff',marginBottom:12,fontWeight:400}}>Vues — 7 jours</div>

          {[['a-ic-v','👁','<strong>12 personnes</strong> ont vu votre fiche','23 min'],['a-ic-c','↗','<strong>Clic</strong> depuis "Couple"','1h'],['a-ic-k','📞','<strong>Appel</strong> via Dolcia','2h'],['a-ic-p','📲','<strong>Push</strong> — 47 ouv.','Hier']].map(([cls,ic,tx,tm])=>(

      <div className="card-box card-p">

class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err)return(
      <div style={{position:'fixed',inset:0,background:'#000',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,fontFamily:"'Outfit',sans-serif"}}>
        <div style={{fontSize:48,marginBottom:20}}>🌊</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,color:'#fff',marginBottom:10,fontWeight:400}}>Dolcia</div>
        <div style={{fontSize:14,color:'rgba(255,255,255,.5)',marginBottom:24,textAlign:'center',lineHeight:1.6,fontWeight:300}}>Une erreur est survenue.<br/>Rechargez pour recommencer.</div>
        <button onClick={()=>window.location.reload()} style={{padding:'14px 32px',borderRadius:99,background:'linear-gradient(115deg,#5A3806,#C8A030 25%,#F0D060 50%,#D4A830 75%,#7A5210)',backgroundSize:'300% 100%',color:'#000',border:'none',cursor:'pointer',fontSize:12,fontWeight:600,letterSpacing:'.15em',textTransform:'uppercase',fontFamily:"'Outfit',sans-serif"}}>
          Recharger
        </button>
      </div>
    );
    return this.props.children;
  }
}

if(typeof showApp==='function') showApp();
ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
